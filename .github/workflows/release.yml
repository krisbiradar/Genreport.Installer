# .github/workflows/release.yml
#
# Triggered on a version tag (e.g. v1.0.0).
# Builds:
#   - configwriter for Windows (amd64) and macOS (arm64 + amd64)
#   - GenreportSetup.exe via Inno Setup on a Windows runner
#   - Genreport.pkg via pkgbuild on a macOS runner
# Then attaches both artifacts to the GitHub Release.
#
# TODO: fill in artifact download steps once launcher and other
#       publish/* binaries are built in their own repos/workflows.

name: Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:

  # ── Build configwriter ──────────────────────────────────────────────────────
  build-configwriter:
    name: Build configwriter (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            artifact: configwriter.exe
          - goos: darwin
            goarch: amd64
            artifact: configwriter-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: configwriter-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: configwriter
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -o ../${{ matrix.artifact }} .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}


  # ── macOS installer (pkgbuild) ─────────────────────────────────────────────
  build-mac-installer:
    name: Build macOS installer
    needs: build-configwriter
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Frontend Repo
        uses: actions/checkout@v4
        with:
          repository: krisbiradar/GenReport.ClientWebsite
          path: external_repos/frontend
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }} # Or a PAT if repos are private

      - name: Checkout Backend Repo
        uses: actions/checkout@v4
        with:
          repository: krisbiradar/GenReport
          path: external_repos/backend
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Go Service Repo
        uses: actions/checkout@v4
        with:
          repository: krisbiradar/GenReport.Go
          path: external_repos/go
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build and Package Mac Installer
        run: |
          chmod +x build_mac_silicon.sh
          ./build_mac_silicon.sh

      - uses: actions/upload-artifact@v4
        with:
          name: Genreport.pkg
          path: Genreport.pkg

  # ── Publish GitHub Release ─────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [build-mac-installer]
    runs-on: ubuntu-latest
    environment:
      name: release-approval
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          files: |
            release-artifacts/Genreport.pkg/Genreport.pkg
